<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 220 220">
  <defs>
    <mask id="b1">
      <image href="banana_pattern.webp" x="0" y="0" width="50" height="65"/>
    </mask>
    <mask id="b2">
      <image href="banana_pattern.webp" x="0" y="0" width="50" height="65"/>
    </mask>
    <mask id="b3">
      <image href="banana_pattern.webp" x="0" y="0" width="50" height="65"/>
    </mask>
  </defs>
  <!-- 3 bananas at diagonal positions, #DADADA at 5%, lots of whitespace -->
