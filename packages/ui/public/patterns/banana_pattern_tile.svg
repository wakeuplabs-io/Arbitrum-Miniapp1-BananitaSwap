  <rect x="130" y="80" width="50" height="65" fill="#DADADA" fill-opacity="0.05" mask="url(#b2)"/>
  <rect x="40" y="150" width="50" height="65" fill="#DADADA" fill-opacity="0.05" mask="url(#b3)"/>
