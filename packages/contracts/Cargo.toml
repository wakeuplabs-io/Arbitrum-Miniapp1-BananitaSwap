[package]
name = "arbitrum-miniapp-contracts-stylus"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
stylus-sdk = "0.10.2"
mini-alloc = "0.4.2"

[features]
# Keep default empty so deploy/check compiles only requested contracts.
# Use --features contract-router | contract-camelot | contract-uniswap-v3.
default = []
export-abi    = ["stylus-sdk/export-abi"]
debug         = ["stylus-sdk/debug"]
contract-router     = []
contract-camelot    = []
contract-uniswap-v3 = []

[lib]
crate-type = ["lib", "cdylib"]

[profile.release]
codegen-units = 1
strip = true
lto = true
panic = "abort"
opt-level = "s"
