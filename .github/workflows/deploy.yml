name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    outputs:
      api_url: ${{ steps.save-outputs.outputs.api_url }}
      ui_url: ${{ steps.save-outputs.outputs.ui_url }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy-arbitrum-miniapp
          aws-region: sa-east-1

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install package dependencies in parallel
        run: |
          npx concurrently \
            --names "API,UI" \
            --prefix-colors "blue,green" \
            "cd packages/api && npm ci --prefer-offline --no-audit" \
            "cd packages/ui && npm ci --prefer-offline --no-audit"

      - name: Migrate database
        working-directory: ./packages/api
        run: npm run db:generate && npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Remove system Pulumi (avoid version conflicts)
        run: |
          sudo rm -f /usr/local/bin/pulumi*
          rm -rf ~/.pulumi

      - name: Deploy
        run: npm run deploy
        env:
          DOMAIN_URL: ${{ vars.DOMAIN_URL }}
          RPC_URL_SEPOLIA: ${{ secrets.RPC_URL_SEPOLIA }}
          RPC_URL_MAINNET: ${{ secrets.RPC_URL_MAINNET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          IS_TESTNET: ${{ vars.IS_TESTNET }}
          ROUTER_ADDRESS_SEPOLIA: ${{ vars.ROUTER_ADDRESS_SEPOLIA }}
          ROUTER_ADDRESS_MAINNET: ${{ vars.ROUTER_ADDRESS_MAINNET }}

      - name: Save Outputs
        id: save-outputs
        run: |
          API_URL=$(jq -r '.api' .sst/outputs.json)
          UI_URL=$(jq -r '.ui' .sst/outputs.json)
          CLOUDWATCH_LOGS_URL=$(jq -r '.cloudwatchLogsUrl' .sst/outputs.json)

          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "ui_url=$UI_URL" >> "$GITHUB_OUTPUT"
          if [ -n "$CLOUDWATCH_LOGS_URL" ]; then
            echo "cloudwatch_logs_url=$CLOUDWATCH_LOGS_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Display Deployment URLs
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL:** ${{ steps.save-outputs.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI URL:** ${{ steps.save-outputs.outputs.ui_url }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.save-outputs.outputs.cloudwatch_logs_url }}" ]; then
            echo "- **CloudWatch Logs:** ${{ steps.save-outputs.outputs.cloudwatch_logs_url }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
