name: Build API

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install API dependencies
        run: npm ci --prefix packages/api --prefer-offline --no-audit

      - name: Build API
        run: npm run build:api

