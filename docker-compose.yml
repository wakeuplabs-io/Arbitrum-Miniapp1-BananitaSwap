version: "3.8"
# dockerized postgres for local development
services:
  postgres:
    image: postgres:15
    container_name: crowncat-postgres
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
